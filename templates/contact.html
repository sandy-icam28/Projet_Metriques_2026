<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Formulaire Aviation</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;

            background: url("https://static.actu.fr/uploads/2023/07/airbus-avion-a321-icelandair.jpg") no-repeat center center/cover;
        }

        /* Voile sombre */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: 0;
        }

        /* Texte côté gauche et droite */
        .side-text {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 40px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.9);
            width: 250px;
            text-align: center;
            z-index: 1;
        }

        .left {
            left: 20px;
        }

        .right {
            right: 20px;
        }

        /* Formulaire */
        .container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.7); /* transparence */
            backdrop-filter: blur(8px);
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #1e3a5f;
        }

        h2::before {
            content: "✈️ ";
        }

        label {
            display: block;
            text-align: left;
            margin-top: 10px;
            color: #1e3a5f;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: #1e90ff;
            box-shadow: 0 0 5px rgba(30,144,255,0.5);
        }

        textarea {
            resize: none;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #1e90ff, #00bfff);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: linear-gradient(45deg, #187bcd, #009acd);
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #555;
        }

        .footer::after {
            content: " 🌍";
        }
    </style>
</head>
<body>

<div class="side-text left">Venez rêvez avec nous ✈️</div>
<div class="side-text right">Venez rêvez avec nous ✈️</div>

<div class="container">
    <h2>Contact Aérien</h2>

    <form>
        <label for="nom">Nom</label>
        <input type="text" id="nom" name="nom" placeholder="Votre nom" required>

        <label for="prenom">Prénom</label>
        <input type="text" id="prenom" name="prenom" placeholder="Votre prénom" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" placeholder="Votre message..." required></textarea>

        <button type="submit">Envoyer ✈️</button>
    </form>

    <div class="footer">Voyagez avec nous</div>
</div>

</body>
</html>
